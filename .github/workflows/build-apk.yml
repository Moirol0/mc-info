name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '22'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile Web App (Vite Build)
        run: npm run build

      - name: Sync Web App Assets to Capacitor Android
        run: npx cap sync android

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Compiled APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: MoirosCalisthenics-Modern-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
