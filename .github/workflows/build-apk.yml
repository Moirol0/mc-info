name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '22'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile Web App (Vite Build)
        run: npm run build

      - name: Sync Web App Assets to Capacitor Android
        run: npx cap sync android

      - name: Configure App Name and Launcher Icon
        run: |
          echo "🔧 Injecting custom app name..."
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Moiro\&#39;s Calisthenics<\/string>/g' "$STRINGS_FILE"
          fi

          echo "🗑️ Removing adaptive XML assets to prevent duplication..."
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

          echo "🎨 Injecting custom app icon layers..."
          for dir in android/app/src/main/res/mipmap-*; do
            if [ -d "$dir" ]; then
              cp public/logo.png "$dir/ic_launcher.png"
              cp public/logo.png "$dir/ic_launcher_round.png"
            fi
          done

      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Compiled APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: MoirosCalisthenics-Modern-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

